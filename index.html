<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glider Through Time</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000;
      font-family: Georgia, 'Times New Roman', serif; }
    #veil { position: fixed; inset: 0; background: #fff; opacity: 0;
      pointer-events: none; transition: opacity 0.7s; z-index: 5; }

    /* ---- HUD ---- */
    .hud { position: fixed; z-index: 4; pointer-events: none; color: #eaf2f8;
      text-shadow: 0 1px 6px #0009; }
    #compass { top: 14px; left: 50%; transform: translateX(-50%); }
    #quest { top: 60px; left: 22px; width: 240px; padding: 12px 16px;
      background: linear-gradient(135deg, rgba(20,40,60,0.55), rgba(10,20,35,0.45));
      border: 1px solid rgba(150,200,255,0.25); border-radius: 8px;
      backdrop-filter: blur(8px); }
    #quest.flash { animation: questIn 0.9s ease-out; }
    @keyframes questIn { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; } }
    #quest-year { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
      color: #9fc8e8; }
    #quest-title { font-size: 18px; margin: 3px 0; }
    #quest-blurb { font-size: 12.5px; font-style: italic; opacity: 0.85; }
    #minimap { top: 60px; right: 22px; }
    .dial { bottom: 90px; width: 92px; height: 92px; border-radius: 50%;
      background: radial-gradient(circle, rgba(10,25,40,0.5) 55%, rgba(120,190,255,0.12) 56%, transparent 72%);
      border: 1.5px solid rgba(150,200,255,0.35);
      display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #dial-speed { left: 15vw; }
    #dial-alt { right: 15vw; }
    .dial .val { font-size: 26px; color: #fff; }
    .dial .unit { font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      color: #9fc8e8; }

    /* ---- transport bar ---- */
    #bar { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center; z-index: 6;
      background: rgba(8,16,26,0.5); border: 1px solid rgba(150,200,255,0.2);
      border-radius: 20px; padding: 7px 16px; backdrop-filter: blur(8px); }
    #bar button { background: none; border: none; color: #fff; font-size: 15px;
      cursor: pointer; font-family: inherit; }
    #seek { width: min(380px, 44vw); accent-color: #ffd27a; }

    /* ---- intro ---- */
    #intro { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px; color: #fff;
      background: radial-gradient(ellipse at 50% 40%, #1b2a4a 0%, #05070f 75%); }
    #intro h1 { font-size: clamp(32px, 6vw, 64px); font-weight: normal;
      letter-spacing: 6px; margin: 0; text-align: center; }
    #intro p { opacity: .7; font-style: italic; }
    #start { font-size: 18px; padding: 12px 44px; border-radius: 30px; cursor: pointer;
      background: #ffd27a; border: none; font-family: inherit; letter-spacing: 2px; }
    #intro.hidden { opacity: 0; pointer-events: none; transition: opacity 1.2s; }
  </style>
</head>
<body>
  <div id="veil"></div>

  <canvas id="compass" class="hud" width="420" height="30"></canvas>
  <div id="quest" class="hud">
    <div id="quest-year"></div>
    <div id="quest-title"></div>
    <div id="quest-blurb"></div>
  </div>
  <canvas id="minimap" class="hud" width="150" height="150"></canvas>
  <div id="dial-speed" class="dial hud">
    <div class="val" id="speed-val">0</div><div class="unit">km/h · speed</div>
  </div>
  <div id="dial-alt" class="dial hud">
    <div class="val" id="alt-val">0</div><div class="unit">m · altitude</div>
  </div>

  <div id="bar">
    <button id="play" title="Play/Pause">⏸</button>
    <input id="seek" type="range" min="0" max="1000" value="0" />
    <button id="speed" title="Speed">1×</button>
    <button id="mute" title="Sound">🔊</button>
  </div>

  <div id="intro">
    <h1>GLIDER THROUGH TIME</h1>
    <p>A flight across history — move the mouse to look around</p>
    <button id="start">BEGIN THE FLIGHT</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
